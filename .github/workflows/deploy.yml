name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name cast-fishing-app --branch main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 0e58fe4a2ba9eabd4aa4e029b8b5ed85

      - name: Health check
        run: |
          sleep 20
          echo "--- castfishingapp.com status + bg check ---"
          HTML=$(curl -s --max-time 15 https://castfishingapp.com/)
          echo "$HTML" | grep -E "< HTTP|title" | head -5 || true
          echo "HTTP: $(curl -o /dev/null -s -w '%{http_code}' https://castfishingapp.com/)"
          echo "$HTML" | grep -c "0A0E1A" && echo "dark bg confirmed" || echo "WARN: no dark bg found"
          echo "$HTML" | head -20
          echo "--- cast-fishing-app.pages.dev ---"
          echo "HTTP: $(curl -o /dev/null -s -w '%{http_code}' https://cast-fishing-app.pages.dev/)"
